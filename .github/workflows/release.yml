name: Release and Upload to CurseForge

on:
  push:
    branches:
      - main

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    if: "!contains(github.event.head_commit.message, '[skip release]')"
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine next version
        id: version
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          git fetch --tags
          latest=$(git tag --list 'v[0-9]*-*' --sort=-v:refname | head -n 1)

          if [ -z "$latest" ]; then
            # No tags yet, start with v1-0
            echo "version=v1-0" >> $GITHUB_OUTPUT
          else
            major=${latest#v}
            major=${major%-*}
            minor=${latest#*-}

            if echo "$COMMIT_MSG" | grep -qF "[major]"; then
              major=$((major + 1))
              minor=0
            else
              minor=$((minor + 1))
            fi

            echo "version=v$major-$minor" >> $GITHUB_OUTPUT
          fi

      # Prepend the pushed commit's message to CHANGELOG.md under the new
      # version. This file is what the packager uploads to CurseForge as the
      # changelog (see manual-changelog in .pkgmeta).
      - name: Update CHANGELOG.md
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          {
            echo "## $VERSION ($(date -u +%Y-%m-%d))"
            echo ""
            echo "$COMMIT_MSG" | sed '/^[[:space:]]*$/d; s/^/- /'
          } > /tmp/entry.md

          marker=$(grep -n '^<!-- AUTO-CHANGELOG -->$' CHANGELOG.md | head -n 1 | cut -d: -f1)
          if [ -z "$marker" ]; then
            echo "CHANGELOG.md is missing the <!-- AUTO-CHANGELOG --> marker!"
            exit 1
          fi

          head -n "$marker" CHANGELOG.md > /tmp/changelog.md
          echo "" >> /tmp/changelog.md
          cat /tmp/entry.md >> /tmp/changelog.md
          tail -n +"$((marker + 1))" CHANGELOG.md >> /tmp/changelog.md
          mv /tmp/changelog.md CHANGELOG.md

      # The changelog commit carries [skip release] so it never triggers
      # another release; the tag points at it so the packaged zip and the
      # GitHub release both include the updated changelog.
      - name: Commit changelog, tag and push
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git commit -m "chore: update changelog for $VERSION [skip release]"
          git tag "$VERSION"
          git push origin HEAD:main "$VERSION"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: ${{ steps.version.outputs.version }}
          body: ${{ github.event.head_commit.message }}

      # Dispatch the package workflow instead of packaging here: the packager
      # refuses to run on branch-push events whose HEAD is tagged ("Found
      # future tag"), and workflow_dispatch is one of the two event types
      # GITHUB_TOKEN is allowed to trigger. The package workflow checks out
      # the latest tag, which is the one created above.
      - name: Trigger CurseForge upload
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run package.yml --ref main -f release_type=release
